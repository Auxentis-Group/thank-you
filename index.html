<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Auxentis Group</title>

<style>
:root{
  --bg:#070707;
  --card: rgba(0,0,0,0.35);
  --border: rgba(255,255,255,0.14);
  --text:#ffffff;
  --muted: rgba(255,255,255,0.78);
  --accent:#e10613;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family: Arial, Helvetica, sans-serif;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 18px;
  background:
    radial-gradient(900px 520px at 50% 15%, rgba(225,6,19,0.18), transparent 58%),
    radial-gradient(900px 620px at 50% 115%, rgba(255,255,255,0.05), transparent 62%),
    var(--bg);
}

.wrap{
  width:100%;
  max-width:860px;
  text-align:center;
}

.card{
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 44px 26px;
  box-shadow: 0 22px 70px rgba(0,0,0,0.65);
  backdrop-filter: blur(10px);
}

.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom: 18px;
}

.logo{
  width: 250px;
  max-width: 85%;
  height: auto;
  display:block;
  filter:
    drop-shadow(0 18px 40px rgba(0,0,0,0.75))
    drop-shadow(0 0 26px rgba(225,6,19,0.18));
}

.divider{
  width: 86px;
  height: 4px;
  background: var(--accent);
  margin: 18px auto 26px auto;
  border-radius: 999px;
}

h1{
  margin:0 0 10px 0;
  font-size: 42px;
  letter-spacing: 0.4px;
}

p{
  margin:10px auto 0 auto;
  max-width: 640px;
  font-size: 18px;
  line-height: 1.55;
  color: var(--muted);
}

@media (max-width:480px){
  .card{ padding: 34px 18px; }
  h1{ font-size: 34px; }
  p{ font-size: 16px; }
}
</style>

<!-- Meta Pixel -->

n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];

<noscript>
<img height="1" width="1" style="display:none"
src="https://www.facebook.com/tr?id=1627935951552384&ev=Lead&noscript=1"/>
</noscript>

</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="logo-wrap">
        <img class="logo" src="auxentis-logo.png" alt="Auxentis Group">
      </div>

      <div class="divider"></div>

      <h1>Thank You</h1>
      <p>Your request has been successfully submitted.</p>
      <p>A member of our team will contact you shortly to work on your estimate.</p>

    </div>
  </div>
</body>
</html>
