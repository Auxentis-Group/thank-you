<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Auxentis Group</title>

<style>

:root{
--bg:#070707;
--border:rgba(255,255,255,0.12);
--text:#ffffff;
--muted:rgba(255,255,255,0.78);
--accent:#e10613;
}

*{
box-sizing:border-box;
}

body{
margin:0;
min-height:100vh;
font-family:Arial, Helvetica, sans-serif;
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
padding:48px 18px;
background:
radial-gradient(900px 520px at 50% 15%, rgba(225,6,19,0.16), transparent 58%),
radial-gradient(900px 620px at 50% 115%, rgba(255,255,255,0.05), transparent 62%),
var(--bg);
}

.wrap{
width:100%;
max-width:820px;
text-align:center;
}

.card{
border:1px solid var(--border);
border-radius:18px;
padding:44px 26px;
box-shadow:0 18px 60px rgba(0,0,0,0.55);
backdrop-filter: blur(10px);
}

.logo{
width:260px;
max-width:85%;
height:auto;
display:block;
margin:0 auto 25px auto;
}

.divider{
width:86px;
height:4px;
background:var(--accent);
margin:18px auto 26px auto;
border-radius:999px;
}

h1{
margin:0 0 10px 0;
font-size:40px;
letter-spacing:0.5px;
}

p{
margin:10px auto 0 auto;
max-width:640px;
font-size:18px;
line-height:1.55;
color:var(--muted);
}

.small{
margin-top:18px;
font-size:14px;
color:rgba(255,255,255,0.55);
}

@media (max-width:480px){

.card{
padding:34px 18px;
}

h1{
font-size:34px;
}

p{
font-size:16px;
}

}

</style>

<body>

<div class="wrap">

<div class="card">

<img class="logo" src="auxentis-logo.png" alt="Auxentis Group">

<p>Your request has been successfully submitted.</p>

<p>A member of our team will contact you shortly to work on your estimate.</p>

</div>

</div>
