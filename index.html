<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Auxentis Group</title>

<style>
:root{
  --bg:#070707;
  --card:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.14);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.80);
  --accent:#e10613;
}

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
font-family:Arial, Helvetica, sans-serif;
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
padding:48px 18px;
background:
radial-gradient(900px 520px at 50% 15%, rgba(225,6,19,0.18), transparent 58%),
radial-gradient(900px 620px at 50% 115%, rgba(255,255,255,0.06), transparent 62%),
var(--bg);
}

.wrap{
width:100%;
max-width:900px;
text-align:center;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:48px 28px;
box-shadow:0 26px 80px rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
}

.logo{
width:240px;
max-width:85%;
margin:0 auto 20px auto;
display:block;
}

.divider{
width:86px;
height:4px;
background:var(--accent);
margin:18px auto 26px auto;
border-radius:999px;
}

h1{
margin:0 0 12px 0;
font-size:42px;
}

p{
margin:10px auto;
max-width:640px;
font-size:18px;
line-height:1.6;
color:var(--muted);
}

.actions{
margin-top:24px;
display:flex;
gap:16px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
display:inline-block;
padding:14px 26px;
border-radius:12px;
font-weight:700;
text-decoration:none;
border:1px solid rgba(255,255,255,0.18);
background:rgba(0,0,0,0.28);
color:#ffffff;
transition:all .2s ease;
}

.btn:hover{
border-color:rgba(255,255,255,0.35);
transform:translateY(-2px);
}

.btn-primary{
background:linear-gradient(135deg,#e10613,#b3000d);
border:none;
}

.small{
margin-top:18px;
font-size:13px;
color:rgba(255,255,255,0.55);
}

@media (max-width:480px){
.card{padding:34px 18px;}
h1{font-size:34px;}
p{font-size:16px;}
.btn{width:100%;max-width:300px;}
}
</style>

<!-- Meta Pixel -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}
(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init','1627935951552384');

const params = new URLSearchParams(window.location.search);

if(params.get('lead') === 'true'){
  fbq('track','Lead');
}
</script>

</head>

<body>

<div class="wrap">
<div class="card">

<img class="logo" src="auxentis-logo.png" alt="Auxentis Group">

<div class="divider"></div>

<h1>Thank You</h1>

<p>Thank you for requesting an estimate.</p>

<p>We typically respond within <strong>10–30 minutes during business hours.</strong></p>

<p>Need a faster response? <strong>Call or text us.</strong></p>

<div class="actions">

<a class="btn btn-primary" href="tel:+14695584056">Call</a>

<a class="btn" href="sms:+14695584056">Text</a>

</div>


</div>
</div>

</body>
</html>
