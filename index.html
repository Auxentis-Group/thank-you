<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Auxentis Group</title>

<style>
:root{
  --bg:#070707;
  --card:rgba(255,255,255,0.06);          /* lighter = more inviting */
  --border:rgba(255,255,255,0.14);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.80);
  --accent:#e10613;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  font-family: Arial, Helvetica, sans-serif;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 18px;
  background:
    radial-gradient(900px 520px at 50% 15%, rgba(225,6,19,0.18), transparent 58%),
    radial-gradient(900px 620px at 50% 115%, rgba(255,255,255,0.06), transparent 62%),
    var(--bg);
}

.wrap{
  width:100%;
  max-width:900px;
  text-align:center;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px 28px;
  box-shadow:0 26px 80px rgba(0,0,0,0.65);
  backdrop-filter:blur(12px);
}

/* soft glow behind logo */
.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:18px;
}

.logo-glow{
  display:inline-block;
  padding:10px 18px;
  border-radius:18px;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.10), rgba(255,255,255,0.00) 70%);
  box-shadow:
    0 0 55px rgba(225,6,19,0.16),
    0 18px 55px rgba(0,0,0,0.55);
}

.logo{
  width:240px;
  max-width:85%;
  height:auto;
  display:block;
  filter: drop-shadow(0 14px 26px rgba(0,0,0,0.65));
}

.divider{
  width:86px;
  height:4px;
  background:var(--accent);
  margin:18px auto 26px auto;
  border-radius:999px;
}

h1{
  margin:0 0 12px 0;
  font-size:42px;
  letter-spacing:0.4px;
}

p{
  margin:10px auto;
  max-width:680px;
  font-size:18px;
  line-height:1.55;
  color:var(--muted);
}

p strong{ color:#ffffff; }

.actions{
  margin-top:22px;
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

/* button style CTAs */
.btn{
  display:inline-block;
  padding:14px 18px;
  border-radius:12px;
  font-weight:700;
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(0,0,0,0.28);
  color:#ffffff;
  box-shadow:0 12px 30px rgba(0,0,0,0.35);
}

.btn:hover{
  border-color:rgba(255,255,255,0.30);
}

.btn-primary{
  background:linear-gradient(135deg, rgba(225,6,19,0.95), rgba(225,6,19,0.70));
  border-color:rgba(225,6,19,0.55);
}

.btn-primary:hover{
  border-color:rgba(255,255,255,0.35);
}

.small{
  margin-top:16px;
  font-size:13px;
  color:rgba(255,255,255,0.55);
}

@media (max-width:480px){
  .card{ padding:34px 18px; }
  h1{ font-size:34px; }
  p{ font-size:16px; }
  .logo{ width:210px; }
  .btn{ width:100%; max-width:360px; }
}
</style>

</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="logo-wrap">
        <div class="logo-glow">
          <img class="logo" src="auxentis-logo.png" alt="Auxentis Group">
        </div>
      </div>

      <div class="divider"></div>

      <h1>Thank You</h1>

      <p>Thank you for requesting an estimate.</p>
      <p>We typically respond within <strong>10–30 minutes during business hours.</strong></p>
      <p>Need a faster response?</p>

      <div class="actions">
        <a class="btn btn-primary" href="tel:14695584056">Call (469) 558-4056</a>
        <a class="btn" href="sms:14695584056">Text (469) 558-4056</a>
      </div>

      <div class="small">Auxentis Group</div>

    </div>
  </div>
</body>
</html>
